spring.application.name=gateway-service
server.port=8080

spring.cloud.gateway.routes[0].id=pedido-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/pedidos/**

spring.cloud.gateway.routes[1].id=pago-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/pagos/**

spring.cloud.gateway.routes[2].id=envio-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/envio/**